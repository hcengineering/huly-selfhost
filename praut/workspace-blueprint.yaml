    action: Upozornit Operations/Admina
  - trigger: Ukol po terminu
    action: Upozornit vlastnika
  - trigger: Blocker
    action: Upozornit odpovednou roli
  - trigger: Kriticky bug
    action: Vytvorit incident nebo urgentni notifikaci
  - trigger: Karta ve stavu K testovani
    action: Vyzadovat test
  - trigger: Karta ve stavu Hotovo
    action: Vyzadovat vyplneny vysledek
  - trigger: Release
    action: Vytvorit release checklist
  - trigger: Incident
    action: Vytvorit postmortem dokument
  - trigger: Novy externista
    action: Vytvorit onboarding checklist
  - trigger: Externista bez aktivity X dni
    action: Zaradit do access review
  - trigger: Vyhrany lead
    action: Vytvorit projekt
  - trigger: AI agent bez dokumentace
    action: Nepovolit oznaceni Hotovo

security_rules:
  - Povinne 2FA pro interni uzivatele a externisty, pokud image podporuje vynuceni.
  - Princip nejnizsiho pristupu.
  - Zakaz sdilenych uctu.
  - Zakaz ukladani API klicu do bezne dokumentace.
  - Password manager jako doporuceny standard.
  - Oddelena prava pro interni uzivatele a externisty.
  - Access review pro externisty a citlive role.
  - Odebrani pristupu pri ukonceni spoluprace.
  - Integrace musi mit vlastnika, ucel, prostredi, ulozeni klicu, pravidla pristupu, dokumentaci, test rezim, fallback a postup obnovy.

