apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Set your namespace
namespace: huly

resources:
  - ../../base

# Pin all Huly images to a specific version.
# Find the latest tag at https://hub.docker.com/u/hardcoreeng
images:
  - name: hardcoreeng/front
    newTag: latest
  - name: hardcoreeng/account
    newTag: latest
  - name: hardcoreeng/transactor
    newTag: latest
  - name: hardcoreeng/collaborator
    newTag: latest
  - name: hardcoreeng/workspace
    newTag: latest
  - name: hardcoreeng/fulltext
    newTag: latest
  - name: hardcoreeng/rekoni-service
    newTag: latest
  - name: hardcoreeng/stats
    newTag: latest

