apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: huly-front
  labels:
    app.kubernetes.io/part-of: huly
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - huly.example
      secretName: huly-tls
  rules:
    - host: huly.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front
                port:
                  number: 8080
