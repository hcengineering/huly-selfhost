apiVersion: apps/v1
kind: Deployment
metadata:
  name: elastic
  labels:
    app.kubernetes.io/name: elastic
    app.kubernetes.io/part-of: huly
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: elastic
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elastic
    spec:
      initContainers:
        - name: sysctl
          image: busybox:1.36
          command: ["sh", "-c", "sysctl -w vm.max_map_count=262144 || true"]
          securityContext:
            privileged: true
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: elasticsearch
          image: elasticsearch:7.14.2
          command:
            - sh
            - -c
            - |
              if ! /usr/share/elasticsearch/bin/elasticsearch-plugin list | grep -q ingest-attachment; then
                /usr/share/elasticsearch/bin/elasticsearch-plugin install --batch ingest-attachment
              fi
              exec /usr/local/bin/docker-entrypoint.sh eswrapper
          ports:
            - name: http
              containerPort: 9200
          env:
            - name: discovery.type
              value: "single-node"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: http.cors.enabled
              value: "true"
            - name: http.cors.allow-origin
              value: "*"
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
          resources:
            requests:
              cpu: 200m
              memory: 768Mi
            limits:
              memory: 1536Mi
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: elastic-data
