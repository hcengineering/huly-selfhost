apiVersion: apps/v1
kind: Deployment
metadata:
  name: kvs
  labels:
    app.kubernetes.io/name: kvs
    app.kubernetes.io/part-of: huly
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kvs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kvs
    spec:
      initContainers:
        - name: wait-cockroach
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z cockroach 26257; do echo waiting for cockroach; sleep 2; done"]
      containers:
        - name: kvs
          # hulykvs does not publish a :latest tag — pin explicitly
          image: hardcoreeng/hulykvs:s0.7.392
          ports:
            - name: http
              containerPort: 8094
          env:
            - name: HULY_DB_CONNECTION
              valueFrom:
                secretKeyRef:
                  name: huly-secret
                  key: CR_DB_URL
            - name: HULY_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: huly-secret
                  key: SERVER_SECRET
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
