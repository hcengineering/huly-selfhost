apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace
  labels:
    app.kubernetes.io/name: workspace
    app.kubernetes.io/part-of: huly
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: workspace
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workspace
    spec:
      initContainers:
        - name: wait-cockroach
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z cockroach 26257; do echo waiting for cockroach; sleep 2; done"]
        - name: wait-redpanda
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redpanda 9092; do echo waiting for redpanda; sleep 2; done"]
      containers:
        - name: workspace
          image: hardcoreeng/workspace:latest
          env:
            - name: SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: huly-secret
                  key: SERVER_SECRET
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: huly-secret
                  key: CR_DB_URL
            - name: ACCOUNTS_DB_URL
              valueFrom:
                secretKeyRef:
                  name: huly-secret
                  key: CR_DB_URL
            - name: STORAGE_CONFIG
              valueFrom:
                secretKeyRef:
                  name: huly-secret
                  key: STORAGE_CONFIG
            - name: ACCOUNTS_URL
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: ACCOUNTS_URL_INTERNAL
            - name: STATS_URL
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: STATS_URL_INTERNAL
            - name: TRANSACTOR_URL
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: TRANSACTOR_URL
            - name: QUEUE_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: QUEUE_CONFIG
            - name: MODEL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: MODEL_ENABLED
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
