apiVersion: apps/v1
kind: Deployment
metadata:
  name: transactor
  labels:
    app.kubernetes.io/name: transactor
    app.kubernetes.io/part-of: huly
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: transactor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: transactor
    spec:
      initContainers:
        - name: wait-cockroach
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z cockroach 26257; do echo waiting for cockroach; sleep 2; done"]
        - name: wait-redpanda
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redpanda 9092; do echo waiting for redpanda; sleep 2; done"]
      containers:
        - name: transactor
          image: hardcoreeng/transactor:latest
          ports:
            - name: ws
              containerPort: 3333
          env:
            - name: SERVER_PORT
              value: "3333"
            - name: SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: huly-secret
                  key: SERVER_SECRET
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: huly-secret
                  key: CR_DB_URL
            - name: STORAGE_CONFIG
              valueFrom:
                secretKeyRef:
                  name: huly-secret
                  key: STORAGE_CONFIG
            - name: ACCOUNTS_URL
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: ACCOUNTS_URL_INTERNAL
            - name: FULLTEXT_URL
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: FULLTEXT_URL
            - name: STATS_URL
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: STATS_URL_INTERNAL
            - name: FRONT_URL
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: FRONT_URL
            - name: QUEUE_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: QUEUE_CONFIG
            - name: LAST_NAME_FIRST
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: LAST_NAME_FIRST
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 15
            periodSeconds: 10
