apiVersion: apps/v1
kind: Deployment
metadata:
  name: account
  labels:
    app.kubernetes.io/name: account
    app.kubernetes.io/part-of: huly
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: account
  template:
    metadata:
      labels:
        app.kubernetes.io/name: account
    spec:
      initContainers:
        - name: wait-cockroach
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z cockroach 26257; do echo waiting for cockroach; sleep 2; done"]
        - name: wait-redpanda
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redpanda 9092; do echo waiting for redpanda; sleep 2; done"]
      containers:
        - name: account
          image: hardcoreeng/account:latest
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: SERVER_PORT
              value: "3000"
            - name: ACCOUNT_PORT
              value: "3000"
            - name: SERVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: huly-secret
                  key: SERVER_SECRET
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: huly-secret
                  key: CR_DB_URL
            - name: STORAGE_CONFIG
              valueFrom:
                secretKeyRef:
                  name: huly-secret
                  key: STORAGE_CONFIG
            - name: TRANSACTOR_URL
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: TRANSACTOR_URL
            - name: FRONT_URL
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: FRONT_URL
            - name: ACCOUNTS_URL
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: ACCOUNTS_URL
            - name: STATS_URL
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: STATS_URL
            - name: QUEUE_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: QUEUE_CONFIG
            - name: MODEL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: MODEL_ENABLED
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: huly-secret
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: huly-secret
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
            - name: ADMIN_EMAILS
              valueFrom:
                configMapKeyRef:
                  name: huly-config
                  key: ADMIN_EMAILS
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
