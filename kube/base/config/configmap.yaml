apiVersion: v1
kind: ConfigMap
metadata:
  name: huly-config
data:
  # External URLs — override these in your overlay
  ACCOUNTS_URL: "https://huly.example/_accounts"
  COLLABORATOR_URL: "wss://huly.example/_collaborator"
  FRONT_URL: "https://huly.example"
  REKONI_URL: "https://huly.example/_rekoni"
  STATS_URL: "https://huly.example/_stats"
  TRANSACTOR_URL: "ws://transactor:3333;wss://huly.example/_transactor"
  # Internal URLs (no need to override)
  ELASTIC_URL: "http://elastic:9200"
  ELASTIC_INDEX_NAME: "huly_storage_index"
  FULLTEXT_URL: "http://fulltext:4700"
  ACCOUNTS_URL_INTERNAL: "http://account:3000"
  REKONI_URL_INTERNAL: "http://rekoni:4004"
  STATS_URL_INTERNAL: "http://stats:4900"
  QUEUE_CONFIG: "redpanda:9092"
  # App settings
  MODEL_ENABLED: "*"
  LAST_NAME_FIRST: "true"
  TITLE: "Huly Self Host"
  DEFAULT_LANGUAGE: "en"
  UPLOAD_URL: "/files"
  ADMIN_EMAILS: "admin@example.com"
  # Optional integration URLs (required by front even if unused)
  GMAIL_URL: "https://huly.example/_gmail"
  TELEGRAM_URL: "https://huly.example/_telegram"
  CALENDAR_URL: "https://huly.example/_calendar"
  LOVE_ENDPOINT: "https://huly.example/_love"
