{{- if and .Values.aibot.enabled .Values.mongodb.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  labels:
    {{- include "huly.labels" . | nindent 4 }}
    app: mongodb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        {{- include "huly.labels" . | nindent 8 }}
        app: mongodb
    spec:
      {{- include "huly.scheduling" . | nindent 6 }}
      containers:
        - name: mongodb
          image: {{ .Values.mongodb.image }}
          ports:
            - name: mongo
              containerPort: 27017
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /data/db
          {{- with .Values.mongodb.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mongodb-data
{{- end }}
