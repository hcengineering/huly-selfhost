{{- if eq (include "huly.minioEnabled" .) "true" }}
apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    {{- include "huly.labels" . | nindent 4 }}
    app: minio
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
{{- end }}
