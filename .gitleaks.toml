# gitleaks konfigurace pro PRAUT huly-selfhost.
# Rozšiřuje výchozí pravidla a přidává allowlist pro známé NEPRAVDIVÉ nálezy.
[extend]
useDefault = true

[allowlist]
description = "Upstream example hodnoty (ne PRAUT tajemství)"
# nginx/docker-compose.yml je upstream ukazkovy soubor (hcengineering/huly-selfhost,
# autor egavrilov@ebay.com, 2024) s example SERVER_SECRET hodnotami. Na main uz neexistuje,
# zustava jen v git historii a je verejne dostupny v upstream repu -> neni to unik PRAUT tajemstvi.
paths = [
  '''nginx/docker-compose\.yml''',
]
